name: E2E Tests

# Run on pull requests targeting main only.
# Deploys to a Vercel preview environment first, then runs E2E tests against
# that preview URL so new tests can be validated before merging.
on:
  pull_request:
    branches:
      - main

# Cancel in-flight runs for the same PR when new commits are pushed.
concurrency:
  group: e2e-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy Vercel preview
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: review-game
    outputs:
      preview_url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: review-game/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@39

      - name: Pull Vercel environment (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel preview
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  e2e-tests:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    needs: deploy-preview
    defaults:
      run:
        working-directory: review-game

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: review-game/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Seed E2E test accounts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
          E2E_TEACHER_EMAIL: ${{ secrets.E2E_TEACHER_EMAIL }}
          E2E_TEACHER_PASSWORD: ${{ secrets.E2E_TEACHER_PASSWORD }}
          E2E_FREE_TEACHER_EMAIL: ${{ secrets.E2E_FREE_TEACHER_EMAIL }}
          E2E_FREE_TEACHER_PASSWORD: ${{ secrets.E2E_FREE_TEACHER_PASSWORD }}
          E2E_SIGNOUT_EMAIL: ${{ secrets.E2E_SIGNOUT_EMAIL }}
          E2E_SIGNOUT_PASSWORD: ${{ secrets.E2E_SIGNOUT_PASSWORD }}
        run: npm run test:e2e:seed

      - name: Run Playwright tests
        env:
          E2E_BASE_URL: ${{ needs.deploy-preview.outputs.preview_url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          E2E_TEACHER_EMAIL: ${{ secrets.E2E_TEACHER_EMAIL }}
          E2E_TEACHER_PASSWORD: ${{ secrets.E2E_TEACHER_PASSWORD }}
          E2E_FREE_TEACHER_EMAIL: ${{ secrets.E2E_FREE_TEACHER_EMAIL }}
          E2E_FREE_TEACHER_PASSWORD: ${{ secrets.E2E_FREE_TEACHER_PASSWORD }}
          E2E_SIGNOUT_EMAIL: ${{ secrets.E2E_SIGNOUT_EMAIL }}
          E2E_SIGNOUT_PASSWORD: ${{ secrets.E2E_SIGNOUT_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
          # Needed by global teardown to delete test-account games after each run
          E2E_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: review-game/playwright-report/
          retention-days: 14

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: review-game/test-results/
          retention-days: 14
