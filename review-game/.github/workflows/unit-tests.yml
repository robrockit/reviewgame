name: Unit Tests

# Run on every push to any branch that has an open PR, and on direct pushes.
on:
  push:
    branches-ignore:
      - 'dependabot/**'
  pull_request:

jobs:
  unit-tests:
    name: Vitest unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: review-game

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: review-game/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: review-game/coverage/
          retention-days: 7
